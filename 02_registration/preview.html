<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>定款（仮） - 株式会社しくみスタジオ</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body {
      font-family: 'Hiragino Sans', 'Yu Gothic', sans-serif;
      max-width: 800px;
      margin: 60px auto;
      padding: 0 24px;
      color: #1a1a1a;
      line-height: 1.8;
    }
    h1 { font-size: 1.8rem; border-bottom: 2px solid #1a1a1a; padding-bottom: 12px; }
    h2 { font-size: 1.3rem; margin-top: 2.5rem; border-bottom: 1px solid #ddd; padding-bottom: 6px; }
    h3 { font-size: 1.05rem; margin-top: 1.5rem; color: #333; }
    blockquote {
      border-left: 4px solid #f59e0b;
      background: #fefce8;
      padding: 12px 16px;
      margin: 16px 0;
      border-radius: 0 6px 6px 0;
      color: #92400e;
    }
    table { border-collapse: collapse; width: 100%; margin: 16px 0; }
    th, td { border: 1px solid #ddd; padding: 8px 12px; text-align: left; }
    th { background: #f5f5f5; }
    hr { border: none; border-top: 1px solid #eee; margin: 2rem 0; }
    ol, ul { padding-left: 1.5rem; }
    li { margin: 4px 0; }
  </style>
</head>
<body>
  <div id="content"></div>
  <script>
    fetch('articles-of-incorporation.md')
      .then(r => r.text())
      .then(text => {
        document.getElementById('content').innerHTML = marked.parse(text);
      });
  </script>
</body>
</html>
